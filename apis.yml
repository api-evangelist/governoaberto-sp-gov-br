apis:
  - aid: governoaberto-sp-gov-br:catalog
    name: Governo Aberto do Estado de São Paulo CKAN Action API
    description: >-
      CKAN Action API for Governo Aberto do Estado de São Paulo, a consistent JSON-over-HTTP interface over a catalog of 419 datasets. Standard actions include package_search, package_show, package_list, organization_list, group_list, tag_list, and resource_search; datastore_search is available where the DataStore extension is enabled. Base URL https://www.governoaberto.sp.gov.br/api/3/action/.
    humanURL: https://www.governoaberto.sp.gov.br
