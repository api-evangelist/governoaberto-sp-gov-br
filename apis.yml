aid: governoaberto-sp-gov-br
name: Governo Aberto do Estado de São Paulo
description: >-
  Governo Aberto do Estado de São Paulo is a open data portal open-data portal for br running CKAN.
  It exposes the CKAN catalog API, a standardized machine-readable interface over approximately 419 datasets,
  supporting programmatic dataset search, metadata retrieval, and resource access. Because it runs CKAN, it shares a
  consistent API surface with every other CKAN portal, making it uniformly harvestable and integrable.
